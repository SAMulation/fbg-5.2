<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FootBored — Multi-Game Viewer</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: #0c0c0c;
    color: #ddd;
    font-family: 'Cabin', system-ui, sans-serif;
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }
  header {
    padding: 8px 16px;
    background: #181818;
    border-bottom: 1px solid #2a2a2a;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
  }
  header h1 { margin: 0; font-size: 16px; font-weight: 600; }
  header .controls { display: flex; gap: 8px; align-items: center; }
  header button, header label {
    background: #2a2a2a;
    color: #ddd;
    border: 1px solid #3a3a3a;
    padding: 4px 10px;
    border-radius: 4px;
    font: inherit;
    font-size: 12px;
    cursor: pointer;
  }
  header button:hover { background: #3a3a3a; }
  header label { cursor: default; display: inline-flex; gap: 4px; align-items: center; }
  header input[type=number] {
    background: #1a1a1a;
    color: #ddd;
    border: 1px solid #3a3a3a;
    width: 50px;
    padding: 2px 6px;
    border-radius: 3px;
    font: inherit;
    font-size: 12px;
  }
  .grid {
    flex: 1;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 4px;
    padding: 4px;
    overflow: hidden;
  }
  .grid.cols-1 { grid-template-columns: 1fr; }
  .grid.cols-2 { grid-template-columns: repeat(2, 1fr); }
  .grid.cols-4 { grid-template-columns: repeat(4, 1fr); }
  .game-pane {
    background: #111;
    border: 1px solid #2a2a2a;
    border-radius: 6px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    min-height: 0;
  }
  .game-pane .pane-header {
    padding: 4px 10px;
    font-size: 11px;
    font-weight: 600;
    background: #1a1a1a;
    border-bottom: 1px solid #2a2a2a;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .game-pane .pane-header .status {
    font-weight: normal;
    color: #888;
  }
  .game-pane .pane-header .status.done { color: #4ade80; }
  .game-pane iframe {
    flex: 1;
    border: 0;
    width: 100%;
    background: #000;
    /* Each iframe renders the full game UI; scaled down so it fits the
       narrow column. transform-origin top-left keeps it anchored. */
    transform: scale(0.5);
    transform-origin: top left;
    width: 200%;
    height: 200%;
  }
  /* When only 1 column, give iframes more room */
  .grid.cols-1 .game-pane iframe { transform: scale(1); width: 100%; height: 100%; }
  .grid.cols-2 .game-pane iframe { transform: scale(0.7); width: 142.85%; height: 142.85%; }
  .grid.cols-4 .game-pane iframe { transform: scale(0.4); width: 250%; height: 250%; }
</style>
</head>
<body>
<header>
  <h1>🏈 FootBored — Multi-Game Viewer</h1>
  <div class="controls">
    <label>Games <input id="numGames" type="number" min="1" max="9" value="3"></label>
    <label>Quarter min <input id="qtrLen" type="number" min="1" max="15" value="1"></label>
    <button id="restart">Restart all</button>
    <span id="globalStatus">…</span>
  </div>
</header>
<div id="grid" class="grid cols-3"></div>

<script>
/* global URLSearchParams, history */

const TEAM_POOL = ['NE', 'GB', 'KC', 'SF', 'CHI', 'DAL', 'BUF', 'PHI', 'BAL', 'CIN',
                   'MIA', 'NYJ', 'PIT', 'DEN', 'LAR', 'TEN', 'HOU', 'CLE']

function pickTeams () {
  const i = Math.floor(Math.random() * TEAM_POOL.length)
  let j = Math.floor(Math.random() * TEAM_POOL.length)
  while (j === i) j = Math.floor(Math.random() * TEAM_POOL.length)
  return [TEAM_POOL[i], TEAM_POOL[j]]
}

function setGridCols (n) {
  const grid = document.getElementById('grid')
  grid.className = 'grid'
  if (n === 1) grid.classList.add('cols-1')
  else if (n === 2) grid.classList.add('cols-2')
  else if (n === 4) grid.classList.add('cols-4')
  else grid.classList.add('cols-3')
}

function buildPanes () {
  const grid = document.getElementById('grid')
  grid.innerHTML = ''
  const numGames = Math.max(1, Math.min(9, parseInt(document.getElementById('numGames').value, 10) || 3))
  const qtrLen = Math.max(1, Math.min(15, parseInt(document.getElementById('qtrLen').value, 10) || 1))

  setGridCols(numGames)

  const panes = []
  for (let i = 0; i < numGames; i++) {
    const [t1, t2] = pickTeams()
    const pane = document.createElement('div')
    pane.className = 'game-pane'
    pane.innerHTML = `
      <div class="pane-header">
        <span>Game ${i + 1}: ${t1} vs ${t2}</span>
        <span class="status" data-status>Loading…</span>
      </div>
      <iframe src="/?dev=computer&t1=${t1}&t2=${t2}&q=${qtrLen}&fast=1" title="Game ${i + 1}"></iframe>
    `
    grid.appendChild(pane)

    const iframe = pane.querySelector('iframe')
    const statusEl = pane.querySelector('[data-status]')
    panes.push({ iframe, statusEl, t1, t2 })
  }

  // Poll each iframe's window.game.engineState until GAME_OVER.
  const polls = panes.map((p) => pollGame(p))
  Promise.all(polls).then(() => {
    document.getElementById('globalStatus').textContent =
      `All ${numGames} games finished`
  })
}

async function pollGame (pane) {
  const start = Date.now()
  return new Promise((resolve) => {
    const tick = () => {
      try {
        const w = pane.iframe.contentWindow
        const g = w && w.game
        const state = g && g.engineState
        if (state) {
          const score1 = state.players?.[1]?.score ?? 0
          const score2 = state.players?.[2]?.score ?? 0
          const phase = state.phase
          const elapsed = ((Date.now() - start) / 1000).toFixed(1)
          if (phase === 'GAME_OVER') {
            pane.statusEl.classList.add('done')
            pane.statusEl.textContent = `${pane.t1} ${score1} – ${pane.t2} ${score2}  (${elapsed}s)`
            resolve(true)
            return
          }
          pane.statusEl.textContent =
            `${pane.t1} ${score1} – ${pane.t2} ${score2}  Q${state.clock?.quarter ?? '?'}  ${phase}`
        } else {
          pane.statusEl.textContent = 'Loading…'
        }
      } catch (err) {
        // Cross-origin or pre-init access; ignore and retry.
      }
      setTimeout(tick, 250)
    }
    tick()
  })
}

document.getElementById('restart').addEventListener('click', buildPanes)
buildPanes()
</script>
</body>
</html>
