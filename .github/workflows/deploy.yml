name: Deploy

on:
  push:
    branches: [main]
  # Also let us re-run from the Actions tab without a new commit.
  workflow_dispatch:

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  test-and-deploy:
    name: test + deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      # Fail early with a clear message if the Cloudflare token isn't set.
      # Otherwise wrangler-action fails a minute later with a less obvious
      # "exit code 1" from inside npx.
      - name: Verify CLOUDFLARE_API_TOKEN secret
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "::error::CLOUDFLARE_API_TOKEN repo secret is not set."
            echo "See .github/workflows/README.md for setup instructions."
            exit 1
          fi
          echo "token length: ${#CLOUDFLARE_API_TOKEN}"

      # ─── Install workspaces ──────────────────────────────────────────
      - name: Install root deps
        run: npm ci

      - name: Install engine deps
        working-directory: packages/engine
        run: npm ci

      - name: Install worker deps
        working-directory: packages/worker
        run: npm ci

      # ─── Test the engine ─────────────────────────────────────────────
      - name: Run engine tests
        run: npm run test:engine

      # ─── Rebuild the browser bundle ──────────────────────────────────
      # public/js/engine.js is committed but we rebuild in CI so a drifted
      # local bundle can't ship stale. This also catches engine changes
      # that weren't re-bundled locally before push.
      - name: Build engine browser bundle
        run: npm run build:engine

      # ─── Deploy to Cloudflare ────────────────────────────────────────
      - name: Deploy Worker + Durable Object + static assets
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          workingDirectory: packages/worker
          command: deploy
